workflows:
  android-workflow:
    name: Islamic Life APK
    max_build_duration: 60
    environment:
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: "com.islamic.life"
    scripts:
      - name: Build APK
        script: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
      - name: Gradle build
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
